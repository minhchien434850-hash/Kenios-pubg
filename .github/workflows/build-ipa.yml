#!/bin/bash
set -e
PROJECT_DIR="$(cd "$(dirname "$0")/.." && pwd)"
cd "$PROJECT_DIR"

# Build dylib
make clean all
if [ ! -f KeniosHax.dylib ]; then
    echo "❌ Không tìm thấy KeniosHax.dylib"
    exit 1
fi

# Yêu cầu IPA gốc
ORIG_IPA="$HOME/Desktop/PUBG_Mobile.ipa"
if [ ! -f "$ORIG_IPA" ]; then
    echo "❌ Vui lòng đặt IPA gốc vào Desktop: PUBG_Mobile.ipa"
    exit 1
fi

# Giải nén IPA
rm -rf build/ipa
mkdir -p build/ipa
unzip -q "$ORIG_IPA" -d build/ipa
APP=$(find build/ipa/Payload -name "*.app" -type d | head -1)
APP_NAME=$(basename "$APP" .app)

# Copy dylib và config
cp KeniosHax.dylib "$APP/"
mkdir -p "$APP/KeniosConfig"
cp config/*.json "$APP/KeniosConfig/"

# Chèn load command vào binary (nếu cần)
BINARY="$APP/$APP_NAME"
if ! otool -L "$BINARY" | grep -q KeniosHax; then
    optool install -p "@executable_path/KeniosHax.dylib" -t "$BINARY"
fi

# Ký bằng chứng chỉ ESign
# Thay "ESign Certificate" bằng tên chứng chỉ của bạn
CERT_NAME="ESign Certificate"
codesign -f -s "$CERT_NAME" --entitlements entitlements.plist "$APP" 2>/dev/null || ldid -S "$APP"

# Đóng gói IPA
cd build/ipa
zip -qr "$PROJECT_DIR/KENIOS_Hax_ESign.ipa" Payload/
cd "$PROJECT_DIR"

echo "✅ IPA đã được tạo: KENIOS_Hax_ESign.ipa"
