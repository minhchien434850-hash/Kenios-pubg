<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KENIOS HAX - Dashboard</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0f;font-family:'Segoe UI',sans-serif;color:#fff;display:flex}
        .sidebar{width:250px;background:#12121a;min-height:100vh;padding:20px;border-right:1px solid #00ffff22}
        .sidebar h2{color:#00ffff;margin-bottom:30px;font-size:20px}
        .sidebar a{display:block;color:#aaa;padding:12px 15px;text-decoration:none;border-radius:8px;margin-bottom:5px;transition:0.3s}
        .sidebar a:hover,.sidebar a.active{background:#1a1a25;color:#00ffff}
        .main{flex:1;padding:30px}
        .main h1{color:#00ffff;margin-bottom:30px}
        .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:30px}
        .stat-card{background:#12121a;padding:20px;border-radius:15px;border:1px solid #00ffff22;text-align:center}
        .stat-card h3{color:#aaa;font-size:14px;margin-bottom:10px}
        .stat-card .value{font-size:36px;font-weight:bold;color:#00ffff}
        table{width:100%;border-collapse:collapse;background:#12121a;border-radius:15px;overflow:hidden}
        th{background:#1a1a25;padding:15px;text-align:left;color:#00ffff;font-size:14px}
        td{padding:12px 15px;border-bottom:1px solid #00ffff11;font-size:13px}
        tr:hover{background:#1a1a2522}
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>🔥 KENIOS HAX</h2>
        <a href="/admin/dashboard" class="active">📊 Dashboard</a>
        <a href="/admin/keys">🔑 Quản Lý Key</a>
        <a href="/admin/users">👥 Người Dùng</a>
        <a href="#" onclick="logout()">🚪 Đăng Xuất</a>
    </div>
    <div class="main">
        <h1>📊 Dashboard</h1>
        <div class="stats">
            <div class="stat-card"><h3>Tổng Key</h3><div class="value" id="totalKeys">--</div></div>
            <div class="stat-card"><h3>Key Đang Hoạt Động</h3><div class="value" id="activeKeys">--</div></div>
            <div class="stat-card"><h3>Thiết Bị</h3><div class="value" id="totalDevices">--</div></div>
            <div class="stat-card"><h3>iOS Support</h3><div class="value" style="font-size:20px;">16.0-26.5</div></div>
        </div>
        <h2 style="color:#00ffff;margin-bottom:15px;">📋 Log Gần Đây</h2>
        <table><thead><tr><th>ID</th><th>Key ID</th><th>Device</th><th>Action</th><th>Time</th></tr></thead><tbody id="logTable"></tbody></table>
    </div>
    <script>
        if(!localStorage.getItem('kenios_token')) window.location.href='/admin';
        async function loadStats(){
            try{
                const res=await fetch('/api/stats/dashboard',{headers:{'Authorization':'Bearer '+localStorage.getItem('kenios_token')}});
                const data=await res.json();
                document.getElementById('totalKeys').textContent=data.total_keys;
                document.getElementById('activeKeys').textContent=data.active_keys;
                document.getElementById('totalDevices').textContent=data.total_devices;
                const tbody=document.getElementById('logTable');
                tbody.innerHTML=data.recent_logs.map(l=>`<tr><td>${l.id}</td><td>${l.key_id}</td><td>${l.device_id?.substring(0,10)}...</td><td>${l.action}</td><td>${new Date(l.created_at).toLocaleString()}</td></tr>`).join('');
            }catch(e){console.error(e)}
        }
        function logout(){localStorage.removeItem('kenios_token');window.location.href='/admin'}
        loadStats();
    </script>
</body>
</html>
