<svg xmlns="http://www.w3.org/2000/svg" width="480" height="180" viewBox="0 0 480 180">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D0D1A;stop-opacity:1" />
    </linearGradient>
    <!-- Cyan-Magenta border gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00FFFF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF00FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00FFFF;stop-opacity:1" />
    </linearGradient>
    <!-- Title text gradient -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00FFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00DDFF;stop-opacity:1" />
    </linearGradient>
    <!-- Gift gradient -->
    <linearGradient id="giftGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF00FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#AA00FF;stop-opacity:1" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="cyanGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="magentaGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadowGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#00FFFF" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Main background -->
  <rect width="480" height="180" rx="16" ry="16" fill="url(#bgGrad)"/>

  <!-- Outer border glow -->
  <rect x="1" y="1" width="478" height="178" rx="15" ry="15"
        fill="none" stroke="url(#borderGrad)" stroke-width="2" opacity="0.9"/>

  <!-- Inner subtle border -->
  <rect x="3" y="3" width="474" height="174" rx="13" ry="13"
        fill="none" stroke="#00FFFF" stroke-width="0.5" opacity="0.2"/>

  <!-- Corner decorations - top left -->
  <line x1="16" y1="3" x2="3" y2="3" stroke="#00FFFF" stroke-width="2"/>
  <line x1="3" y1="3" x2="3" y2="16" stroke="#00FFFF" stroke-width="2"/>
  <!-- Corner decorations - top right -->
  <line x1="464" y1="3" x2="477" y2="3" stroke="#FF00FF" stroke-width="2"/>
  <line x1="477" y1="3" x2="477" y2="16" stroke="#FF00FF" stroke-width="2"/>
  <!-- Corner decorations - bottom left -->
  <line x1="16" y1="177" x2="3" y2="177" stroke="#FF00FF" stroke-width="2"/>
  <line x1="3" y1="177" x2="3" y2="164" stroke="#FF00FF" stroke-width="2"/>
  <!-- Corner decorations - bottom right -->
  <line x1="464" y1="177" x2="477" y2="177" stroke="#00FFFF" stroke-width="2"/>
  <line x1="477" y1="177" x2="477" y2="164" stroke="#00FFFF" stroke-width="2"/>

  <!-- Scan line effect -->
  <rect x="0" y="85" width="480" height="1" fill="#00FFFF" opacity="0.05" rx="16"/>
  <rect x="0" y="90" width="480" height="1" fill="#00FFFF" opacity="0.03" rx="16"/>

  <!-- Gift box icon (left side) -->
  <!-- Box body -->
  <rect x="22" y="95" width="56" height="48" rx="3" fill="url(#giftGrad)" filter="url(#magentaGlow)" opacity="0.9"/>
  <!-- Box lid -->
  <rect x="18" y="82" width="64" height="18" rx="3" fill="#CC00CC" filter="url(#magentaGlow)"/>
  <!-- Ribbon vertical on body -->
  <rect x="47" y="95" width="6" height="48" fill="#FFD700" opacity="0.9"/>
  <!-- Ribbon horizontal on lid -->
  <rect x="18" y="88" width="64" height="6" fill="#FFD700" opacity="0.9"/>
  <!-- Bow left loop -->
  <ellipse cx="37" cy="78" rx="14" ry="9" fill="#FFD700" transform="rotate(-20,37,78)" opacity="0.95"/>
  <!-- Bow right loop -->
  <ellipse cx="63" cy="78" rx="14" ry="9" fill="#FFD700" transform="rotate(20,63,78)" opacity="0.95"/>
  <!-- Bow center knot -->
  <ellipse cx="50" cy="80" rx="6" ry="6" fill="#FFA500"/>
  <!-- Sparkles -->
  <text x="82" y="70" font-size="12" fill="#FFD700" filter="url(#cyanGlow)" opacity="0.9">✦</text>
  <text x="14" y="68" font-size="9" fill="#00FFFF" opacity="0.7">✦</text>
  <text x="74" y="148" font-size="8" fill="#FF00FF" opacity="0.6">✦</text>

  <!-- Divider line -->
  <line x1="100" y1="20" x2="100" y2="160" stroke="url(#borderGrad)" stroke-width="1" opacity="0.5"/>

  <!-- KENIOS title -->
  <text x="120" y="58"
        font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
        font-size="38" font-weight="900" font-style="italic"
        fill="url(#titleGrad)" filter="url(#shadowGlow)"
        letter-spacing="4">KENIOS</text>

  <!-- Subtitle line 1 -->
  <text x="120" y="90"
        font-family="Arial, sans-serif"
        font-size="13" font-weight="bold"
        fill="#AAFFFF" letter-spacing="2" opacity="0.85">KIỂM TRA QUÀ TẶNG</text>

  <!-- Horizontal separator -->
  <line x1="120" y1="100" x2="460" y2="100" stroke="url(#borderGrad)" stroke-width="1" opacity="0.6"/>

  <!-- Tag line -->
  <text x="120" y="118"
        font-family="Arial, sans-serif"
        font-size="10" fill="#888888" letter-spacing="1">GIFT CHECKER  •  PUBG MOBILE  •  iOS 16-26.5</text>

  <!-- Status dots row -->
  <circle cx="120" cy="140" r="5" fill="#44FF44" filter="url(#cyanGlow)"/>
  <text x="130" y="144" font-family="Arial, sans-serif" font-size="10" fill="#44FF44">ACTIVE</text>

  <circle cx="185" cy="140" r="5" fill="#00FFFF" filter="url(#cyanGlow)"/>
  <text x="195" y="144" font-family="Arial, sans-serif" font-size="10" fill="#00FFFF">AUTO-CHECK</text>

  <circle cx="265" cy="140" r="5" fill="#FF00FF" filter="url(#magentaGlow)"/>
  <text x="275" y="144" font-family="Arial, sans-serif" font-size="10" fill="#FF00FF">DAILY REWARD</text>

  <!-- Version badge -->
  <rect x="390" y="128" width="76" height="22" rx="11" fill="#00FFFF" opacity="0.15"
        stroke="#00FFFF" stroke-width="1"/>
  <text x="428" y="143" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="10" font-weight="bold"
        fill="#00FFFF">v4.5.0</text>

  <!-- Bottom scan line decoration -->
  <rect x="120" y="158" width="340" height="1" fill="url(#borderGrad)" opacity="0.3"/>
</svg>
